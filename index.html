<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Strong | Studio Fitness</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ===============================
   RESET & VARIABLES
================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

:root {
    --rojo: #E33E38;
    --negro: #000;
    --gris-fondo: #F9F9F9;
}

/* ===============================
   FONDO GLOBAL
================================ */
body {
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("img/fondo.jpg") center / cover no-repeat fixed;
    color: white;
    overflow-x: hidden;
}

/* ===============================
   HEADER / NAV
================================ */
header {
    width: 100%;
    padding: 40px 0;
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 100;
}

.navbar {
    width: 90%;
    max-width: 1100px;
    height: 60px;
    background: rgba(161, 161, 161, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 100px;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
}

.logo-icon {
    width: 30px;
    height: 30px;
    background: var(--rojo);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
}

.logo-text strong {
    font-size: 0.9rem;
    line-height: 1;
    display: block;
}

.logo-text span {
    font-size: 0.5rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* ===============================
   LINKS NAV
================================ */
.nav-links {
    list-style: none;
    display: flex;
    align-items: center;
    height: 100%;
}

.nav-item {
    height: 100%;
}

.nav-link {
    position: relative;
    height: 100%;
    padding: 0 20px;

    display: flex;
    align-items: center;

    background: none;
    border: none;
    cursor: pointer;

    color: white;
    font-weight: 800;
    font-size: 0.8rem;

    border-radius: 10px;
    transition: color 0.25s ease;
    overflow: hidden;
}

/* Fondo glass */
.nav-link::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(124, 123, 123, 0.35);
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: -1;
}

/* Hover solo escritorio */
@media (hover: hover) {
    .nav-link:hover {
        color: #000;
    }
    .nav-link:hover::after {
        opacity: 1;
    }
}

/* ===============================
   HAMBURGUESA
================================ */
.menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
}

.menu-toggle span {
    width: 25px;
    height: 3px;
    background: white;
    border-radius: 2px;
}

/* ===============================
   HERO
================================ */
.hero {
    height: 80vh;
    display: flex;
    align-items: center;
    padding: 0 10%;
    position: relative;
}

.bg-text {
    position: absolute;
    font-size: 22vw;
    font-weight: 900;
    color: rgba(0,0,0,0.05);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    user-select: none;
    z-index: -1;
}

h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 0.9;
    text-transform: uppercase;
}

.red-text {
    color: var(--rojo);
}

.address {
    margin: 20px 0;
    max-width: 450px;
    color: #ddd;
}

.btn-main {
    display: inline-block;
    background: var(--rojo);
    color: white;
    padding: 16px 40px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 800;
}

/* ===============================
   PLANES
================================ */
.planes {
    background: var(--gris-fondo);
    padding: 80px 5%;
    color: #000;
}

.planes-container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 35px;
    text-align: center;
    border: 2px solid transparent;
    transition: 0.3s;
}

.card:hover {
    border-color: var(--rojo);
    transform: translateY(-5px);
}

.price {
    font-size: 2.5rem;
    font-weight: 900;
    margin: 15px 0;
}

.features {
    list-style: none;
    text-align: left;
    font-size: 0.85rem;
    margin-bottom: 25px;
}

.features li {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

.btn-card {
    display: block;
    background: #000;
    color: white;
    padding: 14px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 800;
}

/* ===============================
   MOBILE
================================ */
@media (max-width: 768px) {

    header {
        padding: 20px 0;
    }

    .menu-toggle {
        display: flex;
    }

    .nav-links {
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 20px;

        flex-direction: column;
        display: none;
    }

    .nav-links.show {
        display: flex;
    }

    .nav-link {
        height: 50px;
        width: 100%;
        justify-content: center;
    }

    .hero {
        height: 60vh;
        text-align: center;
        justify-content: center;
        padding: 0 6%;
    }

    .bg-text {
        font-size: 35vw;
        top: 60%;
    }
}
</style>
</head>

<body>

<header>
<nav class="navbar">
    <a href="#" class="logo">
        <div class="logo-icon">B</div>
        <div class="logo-text">
            <strong>BODY STRONG</strong>
            <span>STUDIO FITNESS</span>
        </div>
    </a>

    <button class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
        <li class="nav-item"><button class="nav-link" onclick="toggleMenu()">INICIO</button></li>
        <li class="nav-item"><button class="nav-link" onclick="toggleMenu()">PLANES</button></li>
        <li class="nav-item"><button class="nav-link" onclick="toggleMenu()">MI CUENTA</button></li>
    </ul>
</nav>
</header>

<main class="hero">
    <div class="bg-text">BODY STRONG</div>
    <div>
        <h1>SUPERA TUS<br><span class="red-text">LÍMITES</span></h1>
        <p class="address">Avenida Las Rastras 1545. Entrenamiento Profesional.</p>
        <a href="#planes" class="btn-main">Ver Matrículas</a>
    </div>
</main>
<br><br><br>
<section class="planes" id="planes">
    <div class="planes-container">
        <div class="card">
            <h3>PLAN<br><span class="red-text">GRUPAL</span></h3>
            <div class="price">$35.000</div>
            <ul class="features">
                <li>Acceso a clases</li>
                <li>Funcional</li>
                <li>Camarines</li>
            </ul>
            <a href="#" class="btn-card">Elegir</a>
        </div>
    </div>
</section>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
