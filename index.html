<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Body Strong | Studio Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* RESET TOTAL */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
        }

        :root { 
            --rojo: #E33E38; 
            --negro: #000000; 
            --gris-fondo: #F9F9F9; 
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Evita el scroll horizontal */
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
        }

        /* NAVEGACIÓN ESTABLE */
        header { 
            width: 100%; 
            padding: 60px 20px; 
            display: flex; 
            justify-content: center;
        }
        
        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background-color: var(--negro); 
            width: 100%;
            max-width: 1100px; /* No se estira más de esto */
            height: 60px; 
            border-radius: 100px; 
            padding: 0 25px; 
            position: relative;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: white; 
            text-decoration: none;
            flex-shrink: 0; /* No deja que el logo se achique */
        }

        .logo-icon { 
            width: 32px; height: 32px; background: var(--rojo); 
            border-radius: 6px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; 
        }

        .nav-links { 
            display: flex; 
            list-style: none; 
            height: 100%; 
            align-items: center; 
        }

        .nav-link {
            color: white; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.85rem;
            padding: 0 20px; 
            height: 100%; 
            display: flex; 
            align-items: center;
            cursor: pointer;
            border: none;
            background: none;
            transition: 0.2s;
            white-space: nowrap; /* Evita que el texto del menú se rompa en 2 líneas */
        }

        /* EFECTO ACTIVO - CORREGIDO PARA ESTABILIDAD */
        .nav-link.active {
            background-color: var(--negro); 
            height: 90px; 
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-top: 0;
            z-index: 10;
        }

        /* HERO SECTION - ADAPTABLE */
        .hero { 
            min-height: 70vh; 
            display: flex; 
            align-items: center; 
            position: relative; 
            padding: 40px 10%;
            width: 100%;
        }
        
        .bg-text {
            position: absolute; 
            font-size: clamp(100px, 20vw, 300px); /* Tamaño controlado */
            font-weight: 900; 
            color: rgba(0,0,0,0.03);
            z-index: -1; 
            left: 50%; top: 50%; 
            transform: translate(-50%, -50%); 
            white-space: nowrap;
            pointer-events: none;
        }

        .container { 
            max-width: 1200px; 
            width: 100%;
        }

        h1 { 
            font-size: clamp(2rem, 7vw, 5.5rem); 
            font-weight: 900; 
            line-height: 0.95; 
            text-transform: uppercase;
        }

        .red-text { color: var(--rojo); }

        /* PLANES - GRID AUTO-AJUSTABLE */
        .planes { 
            padding: 80px 5%; 
            background-color: var(--gris-fondo); 
        }

        .planes-container { 
            display: grid; 
            /* Esta línea es la clave: se adapta según el espacio disponible */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 40px; 
            text-align: center;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .card:hover { border-color: var(--rojo); transform: translateY(-10px); }

        /* INSTAGRAM FLOAT */
        .instagram-float {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 999;
        }
        .instagram-float svg { width: 30px; fill: white; }

        /* MEDIA QUERIES PARA PUNTOS CRÍTICOS */
        
        /* Pantallas medianas (Tablets/Laptops pequeñas) */
        @media (max-width: 1024px) {
            .navbar { width: 95%; }
            .hero { padding: 40px 5%; }
        }

        /* Pantallas pequeñas (Móviles) */
        @media (max-width: 768px) {
            header { padding: 30px 10px; }
            .navbar { height: 55px; padding: 0 15px; }
            .logo-text { display: none; } /* Oculta texto de logo si hay poco espacio */
            
            .nav-link { padding: 0 12px; font-size: 0.75rem; }
            .nav-link.active { height: 75px; border-radius: 12px; }

            .hero { text-align: center; justify-content: center; min-height: 50vh; }
            h1 { font-size: 2.5rem; }
            .bg-text { font-size: 30vw; }
        }

        /* Para evitar deformación en pantallas mini (iPhone SE, etc) */
        @media (max-width: 380px) {
            .nav-link { padding: 0 8px; font-size: 0.65rem; }
            .navbar { padding: 0 10px; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="#" class="logo">
                <div class="logo-icon">B</div>
                <div class="logo-text"><strong>BODY STRONG</strong></div>
            </a>
            <ul class="nav-links">
                <li><button class="nav-link active" onclick="changeTab(this)">INICIO</button></li>
                <li><button class="nav-link" onclick="changeTab(this)">PLANES</button></li>
                <li><button class="nav-link" onclick="changeTab(this)">MI CUENTA</button></li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <div class="bg-text">BODY STRONG</div>
        <div class="container">
            <div class="badge" style="background:#FFEBEB; padding:5px 15px; border-radius:50px; font-size:0.7rem; font-weight:900; margin-bottom:20px; display:inline-block;">● TALCA, CHILE</div>
            <h1>SUPERA TUS <br> <span class="red-text">LÍMITES</span></h1>
            <p style="margin: 20px 0; color: #666; max-width: 500px;">Entrenamiento Grupal, Semi asistido y Personalizado.</p>
            <a href="#planes" style="background:var(--rojo); color:white; padding:16px 40px; border-radius:50px; text-decoration:none; font-weight:800; display:inline-block;">Ver Matrículas</a>
        </div>
    </main>

    <section id="planes" class="planes">
        <div class="planes-container">
            <div class="card">
                <h3 style="font-weight:900; text-transform:uppercase;">PLAN<br><span class="red-text">GRUPAL</span></h3>
                <p style="font-size:2.5rem; font-weight:900; margin:20px 0;">$35.000</p>
                <a href="#" style="display:block; background:#000; color:white; padding:15px; border-radius:50px; text-decoration:none; font-weight:800;">Elegir</a>
            </div>
            <div class="card">
                <h3 style="font-weight:900; text-transform:uppercase;">SEMI<br><span class="red-text">ASISTIDO</span></h3>
                <p style="font-size:2.5rem; font-weight:900; margin:20px 0;">$45.000</p>
                <a href="#" style="display:block; background:#000; color:white; padding:15px; border-radius:50px; text-decoration:none; font-weight:800;">Elegir</a>
            </div>
            <div class="card">
                <h3 style="font-weight:900; text-transform:uppercase;">PERSONAL<br><span class="red-text">TRAINER</span></h3>
                <p style="font-size:2.5rem; font-weight:900; margin:20px 0;">$80.000</p>
                <a href="#" style="display:block; background:#000; color:white; padding:15px; border-radius:50px; text-decoration:none; font-weight:800;">Elegir</a>
            </div>
        </div>
    </section>

    <a href="https://instagram.com" class="instagram-float">
        <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.8 9.9 67.6 36.1 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
    </a>

    <script>
        function changeTab(element) {
            const links = document.querySelectorAll('.nav-link');
            links.forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
